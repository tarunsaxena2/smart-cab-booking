<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Taxi - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* Global Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: url('home page.png') no-repeat center center/cover;
            color: #fff;
            display: flex;
            flex-direction: column;
        }

        /* Header / Navbar */
        header {
            width: 100%;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(6px);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
            position: fixed;
            top: 0;
            z-index: 100;
        }

        header h1 {
            font-size: 28px;
            font-weight: 700;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 18px;
        }

        nav ul li a {
            color: #fff;
            padding: 10px 15px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        nav ul li a:hover {
            background: linear-gradient(135deg, #ff9800, #ff6600);
            color: #000;
            transform: translateY(-3px);
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.4);
        }

        /* Hero Section */
        #home {
            margin-top: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 50px 30px;
            border-radius: 25px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            animation: fadeIn 1.2s ease-out;
        }

        #home h2 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 15px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.6);
        }

        #home p {
            font-size: 1.25rem;
            margin-bottom: 30px;
            line-height: 1.5;
            text-shadow: 1px 1px 8px rgba(0,0,0,0.5);
        }

        /* Button */
        .btn {
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: 700;
            text-decoration: none;
            color: white;
            border-radius: 50px;
            background: linear-gradient(135deg, #ff9800, #ff6600);
            transition: all 0.4s ease;
            box-shadow: 0 8px 25px rgba(255, 152, 0, 0.4);
        }

        .btn:hover {
            transform: scale(1.08) translateY(-3px);
            box-shadow: 0 12px 30px rgba(255, 152, 0, 0.6);
        }

        /* Footer */
        footer {
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: #ddd;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            margin-top: auto;
            padding: 15px 0;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                padding: 15px 20px;
            }
            nav ul {
                flex-direction: column;
                gap: 10px;
                margin-top: 10px;
            }
            #home h2 {
                font-size: 2.2rem;
            }
            #home p {
                font-size: 1rem;
            }
            .btn {
                padding: 12px 25px;
                font-size: 1rem;
            }
        }

    </style>
</head>
<body>

<header>
    <h1>🚖City Taxi</h1>
    <nav>
        <ul>
            <li><a href="login.html">Login</a></li>
            <li><a href="signup.html">Sign Up</a></li>
        </ul>
    </nav>
</header>

<section id="home">
    <h2>Welcome to Taxi Drive</h2>
    <p>Fast, safe, and reliable rides at your fingertips! Enjoy hassle-free booking and secure payments.</p>
    <a href="signup.html" class="btn">Get Started</a>
</section>

<footer>
    <p>&copy; 2025 Ola Taxi. All rights reserved.</p>
</footer>

</body>
</html>
