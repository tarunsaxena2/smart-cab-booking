<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="css/style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>City Taxi - Reviews</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: url('r3.jpg') no-repeat center center/cover;
      min-height: 100vh;
      color: #333;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-color: rgba(0,0,0,0.5);
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.9);
      padding: 20px 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      color: #ff4d4d;
    }

    nav a {
      text-decoration: none;
      color: #333;
      font-weight: 600;
      margin-left: 15px;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 650px;
      margin: 80px auto;
      background: rgba(255,255,255,0.95);
      padding: 35px;
      border-radius: 15px;
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #ff4d4d;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    label {
      font-weight: 600;
    }

    input, select, textarea {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 15px;
      outline: none;
    }

    button {
      background-color: #ff4d4d;
      color: #fff;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    #reviewMessage {
      text-align: center;
      margin-top: 15px;
      font-weight: bold;
    }

    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 20px;
      background: rgba(255,255,255,0.9);
      font-weight: 600;
    }
  </style>
</head>

<body>

<header>
  <h1>City Taxi</h1>
  <nav>
    <a href="booking.html">Book Ride</a>
    <a href="stored-bookings.html">My Bookings</a>
    <a href="payment.html">Payment</a>
    <a href="#" onclick="logout()">Logout</a>
  </nav>
</header>

<div class="container">
  <h2>Leave a Review</h2>

  <form id="reviewForm">
    <label>Booking ID</label>
    <input type="number" id="bookingId" placeholder="Enter Booking ID" required>

    <label>Driver ID</label>
    <input type="number" id="driverId" placeholder="Enter Driver ID" required>

    <label>Rating</label>
    <select id="rating" required>
      <option value="">Select Rating</option>
      <option value="5">★★★★★ - Excellent</option>
      <option value="4">★★★★☆ - Very Good</option>
      <option value="3">★★★☆☆ - Good</option>
      <option value="2">★★☆☆☆ - Fair</option>
      <option value="1">★☆☆☆☆ - Poor</option>
    </select>

    <label>Review</label>
    <textarea id="comment" rows="4" placeholder="Share your experience"></textarea>

    <button type="submit">Submit Review</button>
  </form>

  <p id="reviewMessage"></p>
</div>

<footer>
  &copy; 2026 City Taxi. All rights reserved.
</footer>

<script src="js/api.js"></script>
<script src="js/review.js"></script>

</body>
</html>
