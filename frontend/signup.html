<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="css/style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - City Taxi</title>

  <style>
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: url('s.png') no-repeat center center/cover;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .form-section {
      width: 380px;
      padding: 30px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 18px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.4);
      text-align: center;
      color: white;
    }

    header {
      position: absolute;
      top: 15px;
      text-align: center;
      width: 100%;
      color: white;
      font-size: 26px;
      font-weight: bold;
    }

    .button-link-home {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 10px 18px;
      background: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 600;
    }

    label {
      display: block;
      text-align: left;
      margin-top: 12px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border-radius: 6px;
      border: none;
      outline: none;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #ff9800, #ff6600);
      color: white;
      border: none;
      font-size: 17px;
      font-weight: bold;
      border-radius: 6px;
      margin-top: 18px;
      cursor: pointer;
    }

    #signupMessage {
      font-weight: bold;
      margin-top: 12px;
      text-shadow: 1px 1px 3px black;
    }

    a {
      color: #fff;
      font-weight: bold;
    }
  </style>
</head>

<body>

<a href="index.html" class="button-link-home">Home</a>

<header>
  <h1>City Taxi</h1>
</header>

<section class="form-section">
  <h2>Sign Up</h2>

  <form id="signupForm">
    <label>Full Name:</label>
    <input type="text" id="name" placeholder="Enter your name" required>

    <label>Email:</label>
    <input type="email" id="signupEmail" placeholder="Enter email" required>

    <label>Phone:</label>
    <input type="text" id="phone" placeholder="Enter phone number" required>

    <label>Password:</label>
    <input type="password" id="signupPassword" placeholder="Create password" required>

    <label>Role:</label>
    <select id="role" required>
      <option value="user">User</option>
      <option value="driver">Driver</option>
    </select>

    <button type="submit">Sign Up</button>
  </form>

  <p id="signupMessage"></p>

  <p style="margin-top: 10px;">
    Already have an account? <a href="login.html">Login</a>
  </p>
</section>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
