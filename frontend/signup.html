<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="css/style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - City Taxi</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: url('s.png') no-repeat center center/cover;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      /* Outer Image Theme Border */
      border: 10px solid #ffcc00; 
    }

    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      z-index: 0;
    }

    header {
      position: absolute;
      top: 35px;
      text-align: center;
      width: 100%;
      color: #ffcc00;
      font-size: 28px;
      font-weight: bold;
      z-index: 1;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
    }

    .form-section {
      width: 400px;
      max-width: 90%;
      padding: 35px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      border: 3px solid #ffcc00; 
      text-align: center;
      color: #333;
      margin-top: 85px;
      margin-bottom: 40px;
      z-index: 1;
    }

    .form-section h2 {
      color: #333;
      margin-bottom: 15px;
    }

    .role-tabs {
      display: flex;
      background: #f2f2f2;
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 20px;
      border: 1px solid #e0e0e0;
    }

    .tab-btn {
      flex: 1;
      padding: 11px;
      background: transparent;
      border: none;
      color: #666;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      border-radius: 8px;
      transition: 0.3s;
    }

    .tab-btn:hover {
      color: #222;
    }

    .tab-btn.active {
      background: #ffcc00;
      color: #222;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    label {
      display: block;
      text-align: left;
      margin-top: 14px;
      font-weight: bold;
      color: #555;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      margin-top: 6px;
      border-radius: 10px;
      border: 2px solid #e8e8e8;
      outline: none;
      font-size: 15px;
      background: #fafafa;
      color: #333;
      transition: 0.2s;
    }

    input:focus {
      border-color: #ffcc00;
      background: #fff;
    }

    button.submit-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #ffcc00, #ffa600);
      color: #222;
      border: none;
      font-size: 17px;
      font-weight: bold;
      border-radius: 10px;
      margin-top: 25px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(255, 166, 0, 0.2);
      transition: 0.2s;
    }

    button.submit-btn:hover {
      opacity: 0.95;
    }

    .button-home-bottom {
      display: block;
      width: 100%;
      padding: 10px;
      background: transparent;
      color: #666;
      text-decoration: none;
      border: 2px solid #ccc;
      border-radius: 10px;
      font-weight: bold;
      font-size: 15px;
      transition: 0.2s;
      margin-top: 20px;
      text-align: center;
    }

    .button-home-bottom:hover {
      background: #f5f5f5;
      color: #333;
      border-color: #999;
    }

    #signupMessage {
      font-weight: bold;
      margin-top: 15px;
      color: #cc0000;
    }

    p {
      color: #666;
    }

    a {
      color: #e6a100;
      font-weight: bold;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

<header>
  <h1>City Taxi</h1>
</header>

<section class="form-section">
  <h2>Sign Up</h2>

  <div class="role-tabs">
  <button type="button" class="tab-btn active" onclick="setRole('customer', this)">Customer</button>
  <button type="button" class="tab-btn" onclick="setRole('driver', this)">Driver</button>
  <button type="button" class="tab-btn" onclick="setRole('admin', this)">Admin</button>
</div>

  <form id="signupForm">
    <input type="hidden" id="signupRole" value="customer">

    <label>Full Name:</label>
    <input type="text" id="name" placeholder="Enter your full name" required>

    <label>Email:</label>
    <input type="email" id="signupEmail" placeholder="Enter your email" required>

    <label>Phone:</label>
    <input type="text" id="phone" placeholder="Enter phone number" required>

    <label>Password:</label>
    <input type="password" id="signupPassword" placeholder="Create a strong password" required>

    <button type="submit" class="submit-btn">Sign Up</button>
  </form>

  <p id="signupMessage"></p>

  <p style="margin-top: 20px;">
    Already have an account? <a href="login.html">Login</a>
  </p>

  <a href="index.html" class="button-home-bottom">Back to Home</a>
</section>

<script>
  function setRole(roleName, element) {
    document.getElementById('signupRole').value = roleName;
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    element.classList.add('active');
  }
</script>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
