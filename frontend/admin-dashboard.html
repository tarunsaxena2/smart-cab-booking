<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard - City Taxi</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 30px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    button {
      padding: 10px 18px;
      border: none;
      border-radius: 6px;
      background: #ef4444;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 25px;
      border-radius: 14px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .card h3 {
      color: #94a3b8;
      margin-bottom: 10px;
    }

    .card p {
      font-size: 34px;
      font-weight: bold;
      color: #38bdf8;
    }

    #adminMessage {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>
  <h1>City Taxi Admin Dashboard</h1>
  <button onclick="logout()">Logout</button>
</header>

<div class="grid">
  <div class="card">
    <h3>Total Users</h3>
    <p id="totalUsers">0</p>
  </div>

  <div class="card">
    <h3>Total Drivers</h3>
    <p id="totalDrivers">0</p>
  </div>

  <div class="card">
    <h3>Total Bookings</h3>
    <p id="totalBookings">0</p>
  </div>

  <div class="card">
    <h3>Completed Rides</h3>
    <p id="completedRides">0</p>
  </div>

  <div class="card">
    <h3>Pending Rides</h3>
    <p id="pendingRides">0</p>
  </div>

  <div class="card">
    <h3>Total Revenue</h3>
    <p id="totalRevenue">₹0</p>
  </div>
</div>

<p id="adminMessage"></p>

<script src="js/api.js"></script>
<script>
  if (!getToken()) {
    alert("Please login first.");
    window.location.href = "login.html";
  }

  const user = getUser();

  if (!user || user.role !== "admin") {
    alert("Only admin can access this page.");
    window.location.href = "login.html";
  }

  async function loadAdminDashboard() {
    try {
      const response = await fetch(`${API_BASE_URL}/admin/dashboard`, {
        headers: getAuthHeaders()
      });

      const data = await response.json();

      if (!data.success) {
        document.getElementById("adminMessage").style.color = "red";
        document.getElementById("adminMessage").innerText =
          data.message || "Unable to load dashboard.";
        return;
      }

      const d = data.dashboard;

      document.getElementById("totalUsers").innerText = d.totalUsers;
      document.getElementById("totalDrivers").innerText = d.totalDrivers;
      document.getElementById("totalBookings").innerText = d.totalBookings;
      document.getElementById("completedRides").innerText = d.completedRides;
      document.getElementById("pendingRides").innerText = d.pendingRides;
      document.getElementById("totalRevenue").innerText = "₹" + d.totalRevenue;

    } catch (error) {
      console.error(error);
      document.getElementById("adminMessage").style.color = "red";
      document.getElementById("adminMessage").innerText =
        "Unable to connect to server.";
    }
  }

  loadAdminDashboard();
</script>

</body>
</html>
