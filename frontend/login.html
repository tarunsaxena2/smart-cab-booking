<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - City Taxi</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      background:url('l.png') no-repeat center center/cover;
      position:relative;
      color:#fff;
    }

    body::before{
      content:"";
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,.5);
      z-index:0;
    }

    header{
      margin-top:40px;
      z-index:1;
    }

    header h1{
      font-size:3rem;
    }

    .button-link,
    button.button-link{
      display:inline-block;
      padding:12px 25px;
      background:#28a745;
      color:#fff;
      text-decoration:none;
      border:none;
      border-radius:50px;
      cursor:pointer;
      font-size:16px;
      font-weight:bold;
      transition:.3s;
    }

    .button-link:hover,
    button.button-link:hover{
      background:#218838;
    }

    .form-section{
      margin-top:40px;
      width:400px;
      max-width:90%;
      background:rgba(255,255,255,.15);
      backdrop-filter:blur(10px);
      padding:35px;
      border-radius:15px;
      z-index:1;
    }

    .form-section h2{
      margin-bottom:20px;
      text-align:center;
    }

    label{
      display:block;
      margin-bottom:5px;
    }

    input{
      width:100%;
      padding:12px;
      margin-bottom:20px;
      border:none;
      border-radius:10px;
      outline:none;
      background:rgba(255,255,255,.2);
      color:white;
    }

    input::placeholder{
      color:#ddd;
    }

    .inline-buttons{
      text-align:center;
    }

    #loginMessage{
      margin-top:15px;
      text-align:center;
      font-weight:bold;
    }

    p{
      margin-top:15px;
      text-align:center;
    }

    p a{
      color:gold;
      text-decoration:none;
    }
  </style>
</head>

<body>

<header>
  <h1>City Taxi</h1>
</header>

<br>

<a href="index.html" class="button-link">Home</a>

<section class="form-section">

<h2>Login</h2>

<form id="loginForm">

<label>Email</label>

<input
type="email"
id="email"
placeholder="Enter Email"
required
>

<label>Password</label>

<input
type="password"
id="password"
placeholder="Enter Password"
required
>

<div class="inline-buttons">

<button
type="submit"
class="button-link">
Login
</button>

</div>

</form>

<p id="loginMessage"></p>

<p>
Don't have an account?
<a href="signup.html">Sign Up</a>
</p>

</section>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
