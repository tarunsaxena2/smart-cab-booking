<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Dashboard - City Taxi</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="navbar">
  <h2>🚖 City Taxi</h2>
  <div>
    <a href="index.html">Home</a>
    <a href="booking.html">Book Ride</a>
    <a href="stored-bookings.html">My Bookings</a>
    <a href="payment.html">Payment</a>
    <a href="review.html">Review</a>
    <a href="#" onclick="logout()">Logout</a>
  </div>
</div>

<div class="container">
  <div class="card">
    <h1 id="welcomeText">Welcome User</h1>
    <p>Manage your rides, payments and reviews from one place.</p>
  </div>

  <br>

  <div class="card">
    <h2>Quick Actions</h2>
    <br>
    <a href="booking.html" class="btn">Book Ride</a>
    <a href="stored-bookings.html" class="btn">My Bookings</a>
    <a href="payment.html" class="btn">Payment</a>
    <a href="review.html" class="btn">Review</a>
  </div>
</div>
<br>

<h2>Your Dashboard</h2>

<div style="display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;">

<div class="card">
<h3>Total Bookings</h3>
<p id="totalBookings">0</p>
</div>

<div class="card">
<h3>Completed Rides</h3>
<p id="completedRides">0</p>
</div>

<div class="card">
<h3>Pending Rides</h3>
<p id="pendingRides">0</p>
</div>

<div class="card">
<h3>Total Spent</h3>
<p id="totalSpent">₹0</p>
</div>

</div>
<script src="js/api.js"></script>
<script>
  if (!getToken()) {
    alert("Please login first.");
    window.location.href = "login.html";
  }

  const user = getUser();

  if (!user || user.role !== "user") {
    alert("Only user can access this page.");
    window.location.href = "login.html";
  }

  document.getElementById("welcomeText").innerText =
    `Welcome, ${user.name}`;
async function loadDashboard() {

    try {

        const response = await fetch(`${API_BASE_URL}/bookings/my`, {

            headers: getAuthHeaders()

        });

        const data = await response.json();

        if (!data.success) return;

        const bookings = data.bookings;

        document.getElementById("totalBookings").innerText = bookings.length;

        const completed = bookings.filter(
            b => b.booking_status === "Completed"
        ).length;

        document.getElementById("completedRides").innerText = completed;

        const pending = bookings.filter(
            b => b.booking_status !== "Completed"
        ).length;

        document.getElementById("pendingRides").innerText = pending;

        let total = 0;

        bookings.forEach(b => {

            total += Number(b.estimated_fare || 0);

        });

        document.getElementById("totalSpent").innerText = "₹" + total;

    } catch(err){

        console.log(err);

    }

}

loadDashboard();
</script>

</body>
</html>
