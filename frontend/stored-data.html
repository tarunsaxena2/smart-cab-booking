<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stored User Data</title>

    <style>
        body {
            margin: 0;
            font-family: "Poppins", sans-serif;
            background: url('data.webp') no-repeat center/cover;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h2 {
            color: #fff;
            font-size: 32px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
            margin-bottom: 15px;
            animation: slideDown 1s ease-out;
        }

        /* Back Button */
        .back-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #ff5722, #ff9800);
            color: white;
            text-decoration: none;
            font-size: 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            transition: 0.3s;
        }

        .back-btn:hover {
            transform: translateY(-3px);
            background: linear-gradient(135deg, #ffa726, #ff7043);
        }

        /* Glassmorphic table */
        table {
            width: 90%;
            max-width: 900px;
            border-collapse: collapse;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 35px rgba(0,0,0,0.5);
            animation: fadeInUp 1s ease-out;
        }

        th {
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 14px;
            font-size: 18px;
        }

        td {
            padding: 12px;
            color: white;
            font-weight: 500;
            background: rgba(0,0,0,0.45);
        }

        tr:hover td {
            background: rgba(255,255,255,0.12);
            transition: 0.3s;
        }

        /* No Data Row */
        .no-data {
            text-align: center;
            padding: 20px;
            font-size: 18px;
            color: white;
            background: rgba(0,0,0,0.4);
        }

        /* Animations */
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

</head>
<body>

    <h2>Stored User Data</h2>

    <a href="signup.html" class="back-btn">⬅ Back to Sign Up</a>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Password</th>
            </tr>
        </thead>

        <tbody id="userTable"></tbody>
    </table>

    <script>
        const users = JSON.parse(localStorage.getItem("users")) || [];
        const table = document.getElementById("userTable");

        if (users.length === 0) {
            table.innerHTML = `
                <tr>
                    <td class="no-data" colspan="3">No user data stored.</td>
                </tr>`;
        } else {
            users.forEach(user => {
                table.innerHTML += `
                    <tr>
                        <td>${user.name}</td>
                        <td>${user.email}</td>
                        <td>${user.password}</td>
                    </tr>
                `;
            });
        }
    </script>

</body>
</html>
