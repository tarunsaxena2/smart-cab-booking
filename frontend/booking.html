<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taxi Booking - City Taxi</title>

  <style>
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: url('bb.jpg') no-repeat center center/cover;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 360px;
      padding: 25px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 18px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    }

    h2 {
      text-align: center;
      color: white;
      text-shadow: 1px 1px 4px black;
      margin-bottom: 20px;
    }

    label {
      font-weight: bold;
      color: #fff;
      margin-top: 12px;
      display: block;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border-radius: 6px;
      border: none;
      outline: none;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #16a085, #0e7e65);
      color: white;
      font-size: 17px;
      border: none;
      border-radius: 6px;
      margin-top: 18px;
      cursor: pointer;
      font-weight: bold;
    }

    #bookingMessage {
      text-align: center;
      color: #fff;
      margin-top: 12px;
      font-weight: bold;
    }

    .button-link {
      display: block;
      text-align: center;
      padding: 12px;
      margin-top: 15px;
      background-color: #ff5722;
      color: white;
      text-decoration: none;
      font-weight: bold;
      border-radius: 6px;
    }

    .home-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 10px 18px;
      background-color: #4CAF50;
      color: white;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

<a href="index.html" class="home-btn">Home</a>

<div class="container">
  <h2>Book Your Ride</h2>

  <form id="bookingForm">
    <label>Pickup Location:</label>
    <input type="text" id="pickupLocation" placeholder="Enter pickup point" required>

    <label>Drop Location:</label>
    <input type="text" id="dropLocation" placeholder="Enter drop point" required>

    <label>Cab Type:</label>
    <select id="cabType" required>
      <option value="">Select Cab Type</option>
      <option value="Mini">Mini</option>
      <option value="Sedan">Sedan</option>
      <option value="SUV">SUV</option>
    </select>

    <label>Distance (KM):</label>
    <input type="number" id="distanceKm" step="0.1" placeholder="Enter distance" required>

    <label>Estimated Fare:</label>
    <input type="number" id="estimatedFare" placeholder="Estimated fare" readonly required>

    <button type="submit">Book Now</button>
  </form>

  <p id="bookingMessage"></p>

  <a href="stored-bookings.html" class="button-link">View My Bookings</a>
</div>

<script src="js/api.js"></script>
<script src="js/booking.js"></script>

</body>
</html>
