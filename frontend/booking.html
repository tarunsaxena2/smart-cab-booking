<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

<script>
  // Center Map dynamically over Agra, India
  const map = L.map('map').setView([27.1767, 78.0081], 12);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  setTimeout(() => {
    map.invalidateSize();
  }, 250);

  let pickupMarker = null;
  let dropMarker = null;
  let routingControl = null;

  setupAutocomplete('pickupLocation', 'pickupSuggestions', 'pickup');
  setupAutocomplete('dropLocation', 'dropSuggestions', 'drop');

  // 1. HTML5 Browser GPS Locator API Integration logic
  function getCurrentGPSLocation() {
    const msg = document.getElementById('bookingMessage');
    
    if (!navigator.geolocation) {
      msg.innerText = "Geolocation is not supported by your browser.";
      msg.style.color = "red";
      return;
    }

    msg.innerText = "Fetching your exact coordinates...";
    msg.style.color = "#e6a100";

    navigator.geolocation.getCurrentPosition(
      (position) => {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        const latlng = L.latLng(lat, lon);

        // Reverse Geocode lookups to turn GPS points into an address name string
        const reverseUrl = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`;

        fetch(reverseUrl, { headers: { 'Accept-Language': 'en' } })
          .then(res => res.json())
          .then(data => {
            msg.innerText = ""; // Clear loader
            let locationName = data.display_name ? data.display_name.split(',').slice(0, 3).join(',') : `Lat: ${lat.toFixed(4)}, Lon: ${lon.toFixed(4)}`;
            
            document.getElementById('pickupLocation').value = locationName;
            placeMarker(latlng, 'pickup', locationName);
          })
          .catch(() => {
            msg.innerText = "";
            let fallbackName = `Lat: ${lat.toFixed(4)}, Lon: ${lon.toFixed(4)}`;
            document.getElementById('pickupLocation').value = fallbackName;
            placeMarker(latlng, 'pickup', fallbackName);
          });
      },
      (error) => {
        console.error(error);
        msg.innerText = "Location permission denied. Please allow location tracking access in your browser pop-up window.";
        msg.style.color = "red";
      }
    );
  }

  function setupAutocomplete(inputId, listId, type) {
    const input = document.getElementById(inputId);
    const list = document.getElementById(listId);
    let debounceTimer;

    input.addEventListener('input', function() {
      const query = input.value.trim();
      clearTimeout(debounceTimer);

      if (query.length < 3) {
        list.style.display = 'none';
        return;
      }

      debounceTimer = setTimeout(() => {
        const searchUrl = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=5&countrycodes=in`;

        fetch(searchUrl, { headers: { 'Accept-Language': 'en' } })
        .then(res => res.json())
        .then(data => {
          list.innerHTML = '';
          if (data && data.length > 0) {
            list.style.display = 'block';
            data.forEach(item => {
              const li = document.createElement('li');
              let cleanName = item.display_name.split(',').slice(0, 3).join(',');
              li.innerText = cleanName;
              
              li.addEventListener('click', function() {
                input.value = cleanName;
                list.style.display = 'none';
                const latlng = L.latLng(parseFloat(item.lat), parseFloat(item.lon));
                placeMarker(latlng, type, cleanName);
              });
              list.appendChild(li);
            });
          } else {
            list.style.display = 'none';
          }
        })
        .catch(err => console.error(err));
      }, 500);
    });

    document.addEventListener('click', function(e) {
      if (e.target !== input) list.style.display = 'none';
    });
  }

  function placeMarker(latlng, type, labelName) {
    if (type === 'pickup') {
      if (pickupMarker) map.removeLayer(pickupMarker);
      pickupMarker = L.marker(latlng, { draggable: true }).addTo(map).bindPopup("<b>Pickup:</b><br>" + labelName).openPopup();
      pickupMarker.on('dragend', updateRoute);
    } else {
      if (dropMarker) map.removeLayer(dropMarker);
      dropMarker = L.marker(latlng, { draggable: true }).addTo(map).bindPopup("<b>Dropoff:</b><br>" + labelName).openPopup();
      dropMarker.on('dragend', updateRoute);
    }
    
    map.flyTo(latlng, 14);
    updateRoute();
  }

  function updateRoute() {
    if (!pickupMarker || !dropMarker) return;

    const pCoords = pickupMarker.getLatLng();
    const dCoords = dropMarker.getLatLng();

    if (routingControl) map.removeControl(routingControl);

    routingControl = L.Routing.control({
      waypoints: [L.latLng(pCoords.lat, pCoords.lng), L.latLng(dCoords.lat, dCoords.lng)],
      routeWhileDragging: true,
      show: false,
      createMarker: function() { return null; }
    }).on('routesfound', function(e) {
      const routes = e.routes;
      const distance = (routes[0].summary.totalDistance / 1000).toFixed(1);
      document.getElementById('distanceKm').value = distance;
      calculateFare(parseFloat(distance));
    }).addTo(map);
  }

  function calculateFare(distance) {
    if (!distance) return;
    const cabType = document.getElementById('cabType').value;

    let ratePerKm = 12;
    if (cabType === "Sedan") ratePerKm = 15;
    if (cabType === "SUV") ratePerKm = 20;

    const baseFare = 50; 
    const freeKm = 2;    
    
    let totalFare = baseFare;
    
    if (distance > freeKm) {
      const chargeableDistance = distance - freeKm;
      totalFare += (chargeableDistance * ratePerKm);
    }

    document.getElementById('estimatedFare').value = Math.round(totalFare);
  }

  document.getElementById('cabType').addEventListener('change', function() {
    const dist = parseFloat(document.getElementById('distanceKm').value);
    if (dist) calculateFare(dist);
  });
</script>
